<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>최형지</title> 
    <style>
        header{background-color: skyblue;}
        main{background-color: skyblue;}
        footer{background-color: yellow;}
        img{width: 600px;}
    </style>
</head>
<body>

    <header>
        <h1>명함 신청 페이지</h1>
    </header>

    <main>
        <form>
            1. 학년: 
            <select>
                <option>1학년</option>
                <option>2학년</option>
                <option>3학년</option>
            </select>
            <p></p>

            2. 반: 
            <select>
                <option>1반</option>
                <option>2반</option>
                <option>3반</option>
            </select>
            <p></p>

            3. 번호:<input type="text">
            <p></p>

            4. 이름:<input type="text">
            <p></p>

            5. 원하는 시안 번호 선택<br>
            <img src="https://lh7-rt.googleusercontent.com/formsz/AN7BsVCherQ6yMUjmXW0gCRKc1nZuHfLQV0kwh2n64XaO7WTbSKZLBxS2T-1ne4VtoAT8k6LIcmieNu_M9Mf6iw7wukTLGHW0y3pX21-pIelI0Vv2llcuQYizn-Q3LHjM5uVBhqVYeuuCXrvyjAVyvy2kf5QGYvTdBhMJCVx?key=zXC0opYBWS7IVmphVU1lkQ">
            <p>
            <input type="radio" name="num"> 1안
            <input type="radio" name="num"> 2안
            <input type="radio" name="num"> 3안
            <input type="radio" name="num"> 4안
            <p>
            <input type="radio" name="num"> 5안
            <input type="radio" name="num"> 6안
            <input type="radio" name="num"> 7안
            <input type="radio" name="num"> 8안
            <p></p>

            6. 내가 명함에 넣고 싶은 항목 선택<br>
            <input type="checkbox"> 이름
            <input type="checkbox"> 이메일
            <p>
            <input type="checkbox"> 디스코드 아이디
            <input type="checkbox"> 깃헙 아이디
            <p>
            <input type="checkbox"> 관심분야
            <input type="checkbox"> 휴대폰 번호
            <p></p>

            7. 기타 건의사항<p>
            <textarea cols="30" rows="10"></textarea>
            <p></p>

            <input type="submit" value="전송하기">
            <input type="reset" value="초기화하기">
        </form>
    </main>

    <footer>
        <h2>QnA</h2>
        <details>
            <p><summary>언제까지 내요?</summary></p>
            <p><summary>3월 11일까지 제출합니다.</summary></p>
        </details>
        <details>
            <p><summary>명함 얼마에요?</summary></p>
            <p><summary>무료입니다.</summary></p>
        </details>
        <details>
            <p><summary>늦게내면 어떻게 되나요?</summary></p>
            <p><summary>1학년 전원이 명함발급이 늦어집니다.</summary></p>
        </details>
    </footer>

</body>
</html>
