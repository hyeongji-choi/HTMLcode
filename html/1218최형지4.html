<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>4장 마무리 과제</title>
<style>
    .area1{
        background-color: blueviolet;
        font-family: "Gungsuh";
        font-size: 20px;
    }
    .area2 img {
        box-shadow: 10px 10px 20px;
    }
    .area2 p {
        text-shadow: 2px 2px 4px;
    }
    .area3 {
        cursor: pointer;
    }
    .area4 {
        border-width: 5px;
        border-style: solid;
        border-color: aqua;
        border-radius: 15px;
        box-shadow: 5px 5px 15px;
    }
</style>
</head>
<body>
<div class="area1">
    <h1>영역1</h1>
    <p>배경색, 폰트 변경</p>
</div>
<div class="area2">
    <h1>영역2</h1>
    <p>이미지와 텍스트에 그림자 효과</p>
    <img src="사진4.jpg" alt="이미지">
</div>
<div class="area3">
    <h1>영역3</h1>
    <p>마우스 커서 제어</p>
</div>
<div class="area4">
    <h1>영역4</h1>
    <p>박스의 테두리,색,모양,두께,그림자 효과</p>
</div>
</body>
</html>
